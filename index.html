<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="Browse and organize GitHub repositories by language and project type with an interactive file manager interface.">
  <title>GitHub Repository Organizer</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📂</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Animated Background -->
  <div class="bg-glow"></div>

  <!-- App -->
  <div class="app">

    <!-- Header -->
    <header class="header" id="app-header">
      <div class="header-left">
        <a href="#/" class="logo-link" title="Home">
          <div class="logo-icon">📂</div>
        </a>
        <div>
          <div class="header-title">GitHub Repositories</div>
          <div class="header-subtitle">Repository Organizer for <strong>atanucsejgec</strong></div>
        </div>
      </div>
      <!-- Breadcrumb -->
      <nav class="breadcrumb" id="breadcrumb"></nav>
      <div class="header-actions">
        <button class="btn-icon btn-refresh" id="btn-refresh" title="Refresh repositories">
          <svg viewBox="0 0 16 16" fill="currentColor" width="18" height="18">
            <path
              d="M1.705 8.005a.75.75 0 0 1 .834.656 5.5 5.5 0 0 0 9.592 2.97l-1.204-1.204a.25.25 0 0 1 .177-.427h3.646a.25.25 0 0 1 .25.25v3.646a.25.25 0 0 1-.427.177l-1.38-1.38A7.002 7.002 0 0 1 1.05 8.84a.75.75 0 0 1 .656-.834ZM8 2.5a5.487 5.487 0 0 0-4.131 1.869l1.204 1.204A.25.25 0 0 1 4.896 6H1.25A.25.25 0 0 1 1 5.75V2.104a.25.25 0 0 1 .427-.177l1.38 1.38A7.002 7.002 0 0 1 14.95 7.16a.75.75 0 0 1-1.49.178A5.5 5.5 0 0 0 8 2.5Z" />
          </svg>
        </button>
        <button class="btn-icon" id="btn-settings" title="Settings — GitHub Token">
          <svg viewBox="0 0 16 16" fill="currentColor" width="18" height="18">
            <path
              d="M8 0a8.2 8.2 0 0 1 .701.031C9.444.095 9.99.645 10.16 1.29l.288 1.107c.018.066.079.158.212.224.231.114.454.243.668.386.123.082.233.09.3.071l1.102-.303c.644-.176 1.392.021 1.82.63.25.354.395.744.477 1.13.083.386.142.79.177 1.186.076.869-.009 1.903-.497 2.593-.303.428-.893.623-1.537.448l-1.103-.303c-.066-.018-.176.002-.3.082a5.09 5.09 0 0 1-.668.386c-.133.066-.194.158-.211.224l-.29 1.106c-.168.646-.715 1.196-1.458 1.26a8.006 8.006 0 0 1-1.402 0c-.743-.064-1.29-.614-1.458-1.26l-.29-1.106c-.017-.066-.078-.158-.211-.224a5.09 5.09 0 0 1-.668-.386c-.123-.08-.233-.1-.3-.082l-1.102.303c-.644.175-1.234-.02-1.537-.448-.488-.69-.573-1.724-.497-2.593.035-.396.094-.8.177-1.186.082-.386.228-.776.477-1.13.428-.609 1.176-.806 1.82-.63l1.103.303c.066.019.176-.002.299-.071.214-.143.437-.272.668-.386.133-.066.194-.158.212-.224L5.84 1.29c.17-.645.716-1.195 1.46-1.26A8.203 8.203 0 0 1 8 0ZM6.5 8a1.5 1.5 0 1 0 3 0 1.5 1.5 0 0 0-3 0Z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Stats Bar -->
    <div class="stats-bar" id="stats-bar"></div>

    <!-- Page Container -->
    <main class="page-container" id="page-container">
      <!-- Dynamically rendered by JS -->
    </main>

  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-title">⚙️ Settings</div>
      <div class="modal-desc">
        Add a GitHub Personal Access Token to access private repositories and increase API rate limits.
      </div>
      <div id="token-status" class="token-status disconnected">
        ⚪ No token configured
      </div>
      <div class="form-group">
        <label class="form-label" for="token-input">GitHub Personal Access Token</label>
        <input type="password" class="form-input" id="token-input" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
          autocomplete="off">
        <div class="form-hint">
          Generate a token at <a href="https://github.com/settings/tokens" target="_blank" rel="noopener"
            style="color: var(--accent-blue);">github.com/settings/tokens</a>.
          Token is stored only in your browser's localStorage.
        </div>
      </div>
      <div class="modal-buttons">
        <button class="btn btn-danger" id="btn-delete-token">Delete Token</button>
        <button class="btn btn-secondary" id="btn-close-modal">Cancel</button>
        <button class="btn btn-primary" id="btn-save-token">Save & Reload</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>

</html>
